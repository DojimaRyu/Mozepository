<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mozepository – Skill Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
 *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html {
    font-size: 170%;
  }

  body {
    background: #0e0e0e;
    color: #e8e0d0;
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Header */
  .header {
    background: linear-gradient(180deg, #1a1208 0%, #0e0e0e 100%);
    border-bottom: 2px solid #c97b12;
    padding: 0.75rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 1.8rem;
    letter-spacing: 0.05em;
    color: #f0a020;
    text-transform: uppercase;
  }
  .logo span { color: #e8e0d0; }
  .header-info {
    display: flex;
    align-items: center;
    gap: 1.5rem;
  }
  .level-badge {
    background: #1e1a12;
    border: 1px solid #c97b12;
    border-radius: 4px;
    padding: 0.25rem 0.75rem;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    color: #c0a060;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .sp-counter {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    color: #f0a020;
  }
  .sp-counter .label { color: #888; font-weight: 400; font-size: 0.8rem; margin-right: 4px; }
  .reset-btn {
    background: transparent;
    border: 1px solid #555;
    color: #aaa;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 0.3rem 0.8rem;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .reset-btn:hover { border-color: #c97b12; color: #f0a020; }

  /* Trees layout */
  .trees-container {
    display: flex;
    gap: 0;
    padding: 0;
    overflow-x: auto;
    min-height: calc(100vh - 70px);
  }

  .tree-column {
    flex: 1;
    min-width: 260px;
    border-right: 1px solid #1e1e1e;
    display: flex;
    flex-direction: column;
  }
  .tree-column:last-child { border-right: none; }

  /* Tree header */
  .tree-header {
    padding: 1rem 1rem 0.75rem;
    border-bottom: 1px solid #222;
    position: relative;
    overflow: hidden;
  }
  .tree-header::before {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
  }
  .tree-col-bm .tree-header::before { background: #6a9e3a; }
  .tree-col-dw .tree-header::before { background: #3a8fbf; }
  .tree-col-sor .tree-header::before { background: #d44f30; }
  .tree-col-ic .tree-header::before { background: #c229ba; }

  .tree-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .tree-col-bm .tree-name { color: #88c050; }
  .tree-col-dw .tree-name { color: #5bb8e8; }
  .tree-col-sor .tree-name { color: #e87050; }
  .tree-col-ic .tree-name { color: #9953ca; }

  .tree-subtitle { font-size: 0.75rem; color: #666; margin-top: 2px; }

  .tree-action-skill {
    margin-top: 0.6rem;
    background: #181510;
    border: 1px solid #333;
    border-radius: 4px;
    padding: 0.5rem 0.65rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.8rem;
  }
  .action-skill-icon {
    width: 28px; height: 28px;
    border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
    flex-shrink: 0;
  }
  .tree-col-sor .action-skill-icon { background: #2a1508; color: #e87050; }
  .tree-col-bm .action-skill-icon { background: #152008; color: #88c050; }
  .tree-col-dw .action-skill-icon { background: #0e2a38; color: #5bb8e8; }
  .tree-col-ic .action-skill-icon { background: #251331; color: #9953ca; }

  .action-skill-info {}
  .action-skill-name { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 0.85rem; letter-spacing: 0.04em; }
  .action-skill-desc { color: #777; font-size: 0.7rem; line-height: 1.3; margin-top: 1px; }

  /* Points in tree */
  .tree-pts {
    font-size: 0.72rem;
    color: #666;
    margin-top: 0.5rem;
  }
  .tree-pts span { font-weight: 600; color: #aaa; }

  /* DLC badge */
  .dlc-badge {
    display: inline-block;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    font-weight: 700;
    text-transform: uppercase;
    padding: 1px 5px;
    border-radius: 2px;
    margin-top: 3px;
    background: #2a1808;
    color: #f08838;
    border: 1px solid #5a3010;
  }

  /* Tiers */
  .tier {
    border-bottom: 1px solid #181818;
    padding: 0.6rem 0.75rem;
  }
  .tier-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #444;
    margin-bottom: 0.4rem;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .tier-label::before {
    content: '';
    flex: 1;
    height: 1px;
    background: #282828;
  }
  .tier-locked .tier-label { color: #333; }

  .skills-grid {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  /* Skill node */
  .skill-node {
    background: #151510;
    border: 1px solid #2a2a22;
    border-radius: 4px;
    padding: 0.45rem 0.6rem;
    cursor: pointer;
    transition: border-color 0.12s, background 0.12s;
    user-select: none;
    display: flex;
    align-items: flex-start;
    gap: 0.5rem;
  }
  .skill-node.augment {
    border-left: 2px solid #8a1b17;
    background: #372006;
  }
  .skill-node.weapon-node {
    border-left: 2px solid #5c178a;
    background: #0e0e18;
  }

  .skill-node.unlocked { border-color: #3a3020; background: #1a1810; }
  .skill-node.maxed {
    border-color: #f0a020;
    background: #1e1a0e;
  }
  .skill-node.locked { opacity: 0.4; cursor: not-allowed; }
  .skill-node.augment.maxed { border-left-width: 2px; }

  .tree-col-dw .skill-node.maxed { border-color: #3a8fbf; background: #0a1e2a; }
  .tree-col-sor .skill-node.maxed { border-color: #d44f30; background: #1e0e08; }
  .tree-col-bm .skill-node.maxed { border-color: #6a9e3a; background: #0e1a08; }
  .tree-col-ic .skill-node.maxed { border-color: #9953ca; background: #251331; }

  .tree-col-dw .skill-node.unlocked { background: #0a1520; border-color: #1e3a50; }
  .tree-col-sor .skill-node.unlocked { background: #1a0e08; border-color: #3a2018; }
  .tree-col-bm .skill-node.unlocked { background: #0a1508; border-color: #1e3018; }
  .tree-col-ic .skill-node.unlocked { background: #22112e; border-color: #2b092a; }

  .tree-col-ic .skill-node.augment { background: #1a1208; border-left-color: #5a3010; }
  .tree-col-ic .skill-node.augment.maxed { background: #221408; border-left-color: #d44f20; }

  .skill-icon {
    width: 100px;
    height: 100px;
    border-radius: 4px;
    overflow: hidden;
    flex-shrink: 0;
    background: #202018;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .skill-icon img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .skill-node.maxed .skill-icon { background: #2a2010; color: #f0a020; }
  .skill-node.unlocked .skill-icon { background: #1a1810; color: #c09040; }
  .tree-col-dw .skill-node.maxed .skill-icon { background: #0e2030; color: #5bb8e8; }
  .tree-col-sor .skill-node.maxed .skill-icon { background: #2a1008; color: #e87050; }
  .tree-col-bm .skill-node.maxed .skill-icon { background: #102008; color: #88c050; }
  .tree-col-ic .skill-node.maxed .skill-icon { background: #2a0828; color: #f038d4; }

  .skill-info { flex: 1; min-width: 0; }
  .skill-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    letter-spacing: 0.03em;
    color: #d0c8b8;
    line-height: 1.1;
  }
  .skill-node.maxed .skill-name { color: #f0e8d0; }
  .skill-node.locked .skill-name { color: #555; }

  .skill-type-badge {
    display: inline-block;
    font-size: 0.6rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 1px 4px;
    border-radius: 2px;
    margin-bottom: 2px;
    font-weight: 600;
  }
  .badge-augment { background: #3a2916; color: #b5580b; border: 1px solid #b36812; }
  .badge-weapon { background: #101020; color: #7080c0; border: 1px solid #2a2a50; }

  .skill-desc {
    font-size: 0.7rem;
    color: #666;
    line-height: 1.3;
    margin-top: 2px;
  }
  .skill-node.maxed .skill-desc { color: #888; }

  .skill-pts-row {
    display: flex;
    align-items: center;
    gap: 4px;
    margin-top: 4px;
  }
  .pts-pip {
    width: 10px; height: 4px;
    border-radius: 1px;
    background: #2a2a22;
    transition: background 0.1s;
  }
  .pts-pip.filled { background: #c0a040; }
  .tree-col-dw .pts-pip.filled { background: #3a8fbf; }
  .tree-col-sor .pts-pip.filled { background: #d44f30; }
  .tree-col-bm .pts-pip.filled { background: #6a9e3a; }
  .tree-col-ic .pts-pip.filled { background: #9953ca; }

  .pts-label {
    font-size: 0.65rem;
    color: #555;
    margin-left: 2px;
  }
  .skill-node.maxed .pts-label { color: #888; }

  /* Tooltip */
  .tooltip-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 200;
    pointer-events: none;
  }
  .tooltip-box {
    position: fixed;
    background: #1a1810;
    border: 1px solid #c97b12;
    border-radius: 6px;
    padding: 0.8rem 1rem;
    max-width: 280px;
    min-width: 200px;
    pointer-events: none;
    box-shadow: 0 8px 24px rgba(0,0,0,0.8);
  }
  .tooltip-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    color: #f0e0b0;
    margin-bottom: 4px;
  }
  .tooltip-meta { font-size: 0.72rem; color: #888; margin-bottom: 6px; }
  .tooltip-meta .pts { color: #f0a020; font-weight: 600; }
  .tooltip-desc { font-size: 0.78rem; color: #c0b898; line-height: 1.4; }
  .tooltip-effect { font-size: 0.75rem; color: #90c0a0; margin-top: 6px; font-style: italic; }

  /* Info panel */
  .info-bar {
    background: #0e0e0e;
    border-top: 1px solid #1a1a1a;
    padding: 0.5rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 1.5rem;
    flex-wrap: wrap;
  }
  .info-item { font-size: 0.75rem; color: #555; }
  .info-item strong { color: #888; font-weight: 500; }
  .info-hint {
    font-size: 0.72rem;
    color: #444;
    margin-left: auto;
    font-style: italic;
  }

  /* Scrollable tree body */
  .tree-body { overflow-y: auto; flex: 1; }
</style>
</head>
<body>
<div class="header">
  <div class="logo">Moze<span>pository</span></div>
  <div class="header-info">
    <div class="level-badge">Moze — The Gunner</div>
    <div class="sp-counter"><span class="label">SKILL POINTS</span><span id="sp-used">0</span> / <span id="sp-total">70</span></div>
    <button class="reset-btn" onclick="resetAll()">↺ Reset</button>
  </div>
</div>

<div class="trees-container" id="trees"></div>

<div class="info-bar">
  <div class="info-item">Left-click to add · Right-click to remove</div>
  <div class="info-item">Each tier requires <b>5 pts</b> in the tree to unlock</div>
  <div class="info-hint">Base level 72 = 70 skill points available</div>
</div>

<div class="tooltip-overlay" id="tooltip-overlay">
  <div class="tooltip-box" id="tooltip-box">
    <div class="tooltip-name" id="tt-name"></div>
    <div class="tooltip-meta" id="tt-meta"></div>
    <div class="tooltip-desc" id="tt-desc"></div>
    <div class="tooltip-effect" id="tt-effect"></div>
  </div>
</div>

const state = {};
TREES.forEach(tree => {
  tree.tiers.forEach(tier => {
    tier.skills.forEach(skill => {
      state[skill.id] = 0;
    });
  });
});

function getSkillDesc(skill, pts) {
  const level = pts || 0;

  switch (skill.id) {
    case 'dw_fitsd': 
      return `
        <ul style="margin: 0; padding-left: 1em;">
          <li><b>Bonus Incendiary Damage</b>: <span style="color:#3a8fbf">+${3 * level}%</span></li>
        </ul>
      `;

    case 'dw_deadlines':
      return `
        <ul style="margin: 0; padding-left: 1em;">
          <li><b>Fuel Returned</b>: <span style="color: #3a8fbf">+${2 * level}%</span></li>
            <li><b>Fuel Drain</b>: <span style="color: #3a8fbf">-${10 * level}%</span></li>
        </ul>
      `;

    case 'dw_grizzled':
      return `
        <ul style="margin: 0; padding-left: 1em;">
          <li><b>Iron Bear Cooldown</b>: <span style="color:#3a8fbf">-${1 * level}</span> sec</li>
        </ul>
      `;

    default:
      return skill.desc;
  }
}

function getTreePts(tree) {
  let total = 0;
  tree.tiers.forEach(tier => {
    tier.skills.forEach(skill => {
      if (skill.type !== 'augment' && skill.type !== 'weapon') total += state[skill.id];
    });
  });
  return total;
}

function getTotalUsed() {
  let total = 0;
  Object.values(state).forEach(v => total += v);
  return total;
}

function getAvailable() { return 70 - getTotalUsed(); }

function isTierUnlocked(tree, tierIdx) {
  if (tierIdx === 0) return true;
  return getTreePts(tree) >= tree.tiers[tierIdx].required;
}

function canAddPoint(tree, skill) {
  if (skill.type === 'weapon' || skill.type === 'augment') return false;
  if (state[skill.id] >= skill.maxPts) return false;
  if (getAvailable() <= 0) return false;
  const tierIdx = tree.tiers.findIndex(t => t.skills.find(s => s.id === skill.id));
  if (!isTierUnlocked(tree, tierIdx)) return false;
  if (skill.type === 'augment') {
    if (state[skill.id] >= 1) return false;
  }
  return true;
}

function canRemovePoint(tree, skill) {
  if (state[skill.id] <= 0) return false;
  const tierIdx = tree.tiers.findIndex(t => t.skills.find(s => s.id === skill.id));
  const pts = getTreePts(tree);
  let wouldBe = pts;
  if (skill.type !== 'augment' && skill.type !== 'weapon') wouldBe = pts - 1;
  for (let i = tierIdx + 1; i < tree.tiers.length; i++) {
    const hasSpentInHigher = tree.tiers[i].skills.some(s => state[s.id] > 0);
    if (hasSpentInHigher && wouldBe <= tree.tiers[i].required) return false;
  }
  return true;
}

function handleSkillClick(e, treeId, skillId) {
  e.preventDefault();
  const tree = TREES.find(t => t.id === treeId);
  const skill = tree.tiers.flatMap(t => t.skills).find(s => s.id === skillId);
  if (e.type === 'contextmenu') {
    if (canRemovePoint(tree, skill)) { state[skillId]--; render(); }
  } else {
    if (canAddPoint(tree, skill)) { state[skillId]++; render(); }
  }
}

function resetAll() {
  Object.keys(state).forEach(k => state[k] = 0);
  render();
}

function showTooltip(e, skill) {
  const overlay = document.getElementById('tooltip-overlay');
  const box = document.getElementById('tooltip-box');
  overlay.style.display = 'block';
  document.getElementById('tt-name').textContent = skill.name;
  let meta = '';
  if (skill.type === 'augment') meta += 'Augment · ';
  else if (skill.type === 'weapon') meta += 'Iron Bear Weapon · ';
  else if (skill.maxPts > 1) meta += `Max ${skill.maxPts} pts · `;
  meta += `${state[skill.id]}/${skill.maxPts} points`;
  document.getElementById('tt-meta').innerHTML = `<span class="pts">${meta}</span>`;
  const pts = state[skill.id];
  document.getElementById('tt-desc').innerHTML = getSkillDesc(skill, pts);
  document.getElementById('tt-effect').textContent = skill.effect || '';

  const rect = e.currentTarget.getBoundingClientRect();
  const bw = 280, bh = 160;
  let left = rect.right + 8;
  let top = rect.top;
  if (left + bw > window.innerWidth - 16) left = rect.left - bw - 8;
  if (top + bh > window.innerHeight - 16) top = window.innerHeight - bh - 16;
  box.style.left = left + 'px';
  box.style.top = Math.max(8, top) + 'px';
}

function hideTooltip() {
  document.getElementById('tooltip-overlay').style.display = 'none';
}

function stripHtml(html)
{
   let tmp = document.createElement("DIV");
   tmp.innerHTML = html;
   return tmp.textContent || tmp.innerText || "";
}

function render() {
  const container = document.getElementById('trees');
  container.innerHTML = '';

  TREES.forEach(tree => {
    const treePts = getTreePts(tree);
    const col = document.createElement('div');
    col.className = `tree-column tree-col-${tree.id}`;

    let html = `
      <div class="tree-header">
        <div class="tree-name">${tree.name}</div>
        <div class="tree-subtitle">${tree.subtitle}</div>
        <div class="tree-action-skill">
          <div class="action-skill-icon">${tree.actionSkill.icon}</div>
          <div class="action-skill-info">
            <div class="action-skill-name">${tree.actionSkill.name}</div>
            <div class="action-skill-desc">${tree.actionSkill.desc}</div>
          </div>
        </div>
        <div class="tree-pts">Tree points: <span>${treePts}</span></div>
      </div>
      <div class="tree-body">`;

    tree.tiers.forEach((tier, tierIdx) => {
      const unlocked = isTierUnlocked(tree, tierIdx);
      html += `<div class="tier${unlocked ? '' : ' tier-locked'}">
        <div class="tier-label">Tier ${tierIdx + 1}${tier.required > 0 ? ' · ' + tier.required + ' pts' : ''}</div>
        <div class="skills-grid">`;

      tier.skills.forEach(skill => {
        const pts = state[skill.id];
        const isMaxed = pts >= skill.maxPts;
        const isLocked = !unlocked || skill.type === 'classmod';
        let nodeClass = 'skill-node';
        if (skill.type === 'augment') nodeClass += ' augment';
        if (skill.type === 'weapon') nodeClass += ' weapon-node';
        if (isMaxed) nodeClass += ' maxed';
        else if (pts > 0) nodeClass += ' unlocked';
        else if (isLocked) nodeClass += ' locked';

        let pipsHtml = '';
        if (skill.maxPts > 1) {
          pipsHtml = '<div class="skill-pts-row">';
          for (let i = 0; i < skill.maxPts; i++) {
            pipsHtml += `<div class="pts-pip${i < pts ? ' filled' : ''}"></div>`;
          }
          pipsHtml += `<span class="pts-label">${pts}/${skill.maxPts}</span></div>`;
        }

        let badgeHtml = '';
        if (skill.type === 'augment') badgeHtml = '<span class="skill-type-badge badge-augment">Augment</span>';
        if (skill.type === 'weapon') badgeHtml = '<span class="skill-type-badge badge-weapon">IB Weapon</span>';

        html += `<div class="${nodeClass}" data-tree="${tree.id}" data-skill="${skill.id}">
          <div class="skill-icon">
            <img src="${skill.icon}" alt="${skill.name}" />
          </div>
          <div class="skill-info">
            ${badgeHtml}
            <div class="skill-name">${skill.name}</div>
            <!-- TODO: Disregard HTML from the substring -->
            <div class="skill-desc">${skill.desc}</div>
            ${pipsHtml}
          </div>
        </div>`;
      });

      html += `</div></div>`;
    });

    html += `</div>`;
    col.innerHTML = html;
    container.appendChild(col);

    col.querySelectorAll('.skill-node:not(.weapon-node):not(.locked)').forEach(el => {
      const treeId = el.dataset.tree;
      const skillId = el.dataset.skill;
      const t = TREES.find(x => x.id === treeId);
      const s = t.tiers.flatMap(x => x.skills).find(x => x.id === skillId);
      el.addEventListener('click', e => handleSkillClick(e, treeId, skillId));
      el.addEventListener('contextmenu', e => { e.preventDefault(); handleSkillClick(e, treeId, skillId); });
      el.addEventListener('mouseenter', e => showTooltip(e, s));
      el.addEventListener('mouseleave', hideTooltip);
    });

    col.querySelectorAll('.skill-node.weapon-node, .skill-node.locked').forEach(el => {
      const treeId = el.dataset.tree;
      const skillId = el.dataset.skill;
      const t = TREES.find(x => x.id === treeId);
      const s = t.tiers.flatMap(x => x.skills).find(x => x.id === skillId);
      el.addEventListener('mouseenter', e => showTooltip(e, s));
      el.addEventListener('mouseleave', hideTooltip);
    });
  });

  document.getElementById('sp-used').textContent = getTotalUsed();
}

render();
</script>
