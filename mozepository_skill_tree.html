<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mozepository – Skill Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    font-size: clamp(12px, 1.15vw, 18px);

    --icon-size:   clamp(52px, 5.5vw, 90px);
    --as-icon-size: clamp(48px, 4.5vw, 68px);
    --header-h:    clamp(48px, 5.5vh, 72px);
  }

  body {
    background: #0e0e0e;
    color: #e8e0d0;
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── Header ──────────────────────────────────────────────── */
  .header {
    background: linear-gradient(180deg, #1a1208 0%, #0e0e0e 100%);
    border-bottom: 2px solid #c97b12;
    padding: 0 2rem;
    height: var(--header-h);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 1.8rem;
    letter-spacing: 0.05em;
    color: #f0a020;
    text-transform: uppercase;
  }
  .logo span { color: #e8e0d0; }
  .header-info { display: flex; align-items: center; gap: 1.5rem; }
  .level-badge {
    background: #1e1a12;
    border: 1px solid #c97b12;
    border-radius: 4px;
    padding: 0.25rem 0.75rem;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    color: #c0a060;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .sp-counter {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    color: #f0a020;
  }
  .sp-counter .label { color: #888; font-weight: 400; font-size: 0.8rem; margin-right: 4px; }
  .reset-btn {
    background: transparent;
    border: 1px solid #555;
    color: #aaa;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 0.3rem 0.8rem;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .reset-btn:hover { border-color: #c97b12; color: #f0a020; }

  /* ─── Trees layout ────────────────────────────────────────── */
  .trees-container {
    display: flex;
    gap: 0;
    padding: 0;
    min-height: calc(100vh - var(--header-h) - 36px);
  }
  .tree-column {
    flex: 1;
    min-width: 0;           /* let columns shrink below content width */
    border-right: 1px solid #1e1e1e;
    display: flex;
    flex-direction: column;
  }
  .tree-column:last-child { border-right: none; }

  /* ─── Tree header ─────────────────────────────────────────── */
  .tree-header {
    padding: 0.75rem 0.875rem 0.75rem;
    border-bottom: 1px solid #222;
    position: relative;
  }
  .tree-header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
  }
  .tree-col-bm .tree-header::after  { background: #6a9e3a; }
  .tree-col-dw .tree-header::after  { background: #3a8fbf; }
  .tree-col-sor .tree-header::after { background: #d44f30; }
  .tree-col-ic  .tree-header::after { background: #c229ba; }

  .tree-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.05rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .tree-col-bm  .tree-name { color: #88c050; }
  .tree-col-dw  .tree-name { color: #5bb8e8; }
  .tree-col-sor .tree-name { color: #e87050; }
  .tree-col-ic  .tree-name { color: #c060e0; }

  .tree-subtitle { font-size: 0.72rem; color: #666; margin-top: 1px; }

  /* ─── Action-Skill block ──────────────────────────────────── */
  .tree-action-skill {
    margin-top: 0.6rem;
    border-radius: 5px;
    overflow: hidden;
    border: 1px solid #333;
  }

  /* Coloured header strip */
  .as-header {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.3rem 0.55rem;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .tree-col-bm  .as-header { background: #152b10; color: #88c050; border-bottom: 1px solid #2a4818; }
  .tree-col-dw  .as-header { background: #0e2030; color: #5bb8e8; border-bottom: 1px solid #1a3a50; }
  .tree-col-sor .as-header { background: #2a1008; color: #e87050; border-bottom: 1px solid #4a2010; }
  .tree-col-ic  .as-header { background: #200e2a; color: #c060e0; border-bottom: 1px solid #3a1850; }

  .as-header-icon {
    width: var(--as-icon-size);
    height: var(--as-icon-size);
    border-radius: 3px;
    overflow: hidden;
    flex-shrink: 0;
    background: rgba(0,0,0,0.35);
  }
  .as-header-icon img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .as-header-text { display: flex; flex-direction: column; gap: 1px; }
  .as-label {
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 0.14em;
    opacity: 0.7;
  }
  .as-name { font-size: 0.85rem; font-weight: 700; letter-spacing: 0.04em; }

  /* Body of action skill card */
  .as-body {
    padding: 0.45rem 0.55rem;
    background: #0d0d0a;
    font-size: 0.7rem;
    color: #888;
    line-height: 1.4;
  }
  .as-body i { color: #555; font-style: italic; }

  /* ─── Tree points ─────────────────────────────────────────── */
  .tree-pts { font-size: 0.68rem; color: #555; margin-top: 0.45rem; }
  .tree-pts span { font-weight: 600; color: #999; }

  /* DLC badge */
  .dlc-badge {
    display: inline-block;
    font-size: 0.58rem;
    letter-spacing: 0.1em;
    font-weight: 700;
    text-transform: uppercase;
    padding: 1px 5px;
    border-radius: 2px;
    margin-top: 3px;
    background: #2a1808;
    color: #f08838;
    border: 1px solid #5a3010;
  }

  /* ─── Tier rows ───────────────────────────────────────────── */
  .tier { border-bottom: 1px solid #181818; padding: 0.55rem 0.65rem; }
  .tier-label {
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #444;
    margin-bottom: 0.35rem;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .tier-label::before { content: ''; flex: 1; height: 1px; background: #282828; }
  .tier-locked .tier-label { color: #333; }
  .skills-grid { display: flex; flex-direction: column; gap: 4px; }

  /* ─── Skill nodes ─────────────────────────────────────────── */
  .skill-node {
    background: #151510;
    border: 1px solid #2a2a22;
    border-radius: 4px;
    padding: 0.4rem 0.5rem;
    cursor: pointer;
    transition: border-color 0.12s, background 0.12s;
    user-select: none;
    display: flex;
    align-items: flex-start;
    gap: 0.45rem;
  }
  .skill-node.augment  { border-left: 2px solid #8a1b17; background: #372006; }
  .skill-node.weapon-node { border-left: 2px solid #5c178a; background: #0e0e18; }

  .skill-node.unlocked { border-color: #3a3020; background: #1a1810; }
  .skill-node.maxed    { border-color: #f0a020; background: #1e1a0e; }
  .skill-node.locked   { opacity: 0.4; cursor: not-allowed; }

  .tree-col-dw  .skill-node.maxed { border-color: #3a8fbf; background: #0a1e2a; }
  .tree-col-sor .skill-node.maxed { border-color: #d44f30; background: #1e0e08; }
  .tree-col-bm  .skill-node.maxed { border-color: #6a9e3a; background: #0e1a08; }
  .tree-col-ic  .skill-node.maxed { border-color: #9953ca; background: #251331; }

  .tree-col-dw  .skill-node.unlocked { background: #0a1520; border-color: #1e3a50; }
  .tree-col-sor .skill-node.unlocked { background: #1a0e08; border-color: #3a2018; }
  .tree-col-bm  .skill-node.unlocked { background: #0a1508; border-color: #1e3018; }
  .tree-col-ic  .skill-node.unlocked { background: #22112e; border-color: #2b092a; }

  .tree-col-ic .skill-node.augment       { background: #1a1208; border-left-color: #5a3010; }
  .tree-col-ic .skill-node.augment.maxed { background: #221408; border-left-color: #d44f20; }

  /* ─── Skill icon ──────────────────────────────────────────── */
  .skill-icon {
    width:  var(--icon-size);
    height: var(--icon-size);
    border-radius: 4px;
    overflow: hidden;
    flex-shrink: 0;
    background: #202018;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .skill-icon img { width: 100%; height: 100%; object-fit: cover; display: block; }

  /* ─── Skill text ──────────────────────────────────────────── */
  .skill-info { flex: 1; min-width: 0; }
  .skill-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    letter-spacing: 0.03em;
    color: #d0c8b8;
    line-height: 1.15;
  }
  .skill-node.maxed  .skill-name { color: #f0e8d0; }
  .skill-node.locked .skill-name { color: #555; }

  .skill-type-badge {
    display: inline-block;
    font-size: 0.58rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 1px 4px;
    border-radius: 2px;
    margin-bottom: 2px;
    font-weight: 600;
  }
  .badge-augment { background: #3a2916; color: #b5580b; border: 1px solid #b36812; }
  .badge-weapon  { background: #101020; color: #7080c0; border: 1px solid #2a2a50; }

  .skill-desc {
    font-size: 0.68rem;
    color: #666;
    line-height: 1.3;
    margin-top: 2px;
  }
  .skill-node.maxed .skill-desc { color: #888; }

  /* ─── Pip row ─────────────────────────────────────────────── */
  .skill-pts-row { display: flex; align-items: center; gap: 3px; margin-top: 4px; }
  .pts-pip {
    width: clamp(6px, 0.7vw, 12px);
    height: 4px;
    border-radius: 1px;
    background: #2a2a22;
    transition: background 0.1s;
  }
  .pts-pip.filled { background: #c0a040; }
  .tree-col-dw  .pts-pip.filled { background: #3a8fbf; }
  .tree-col-sor .pts-pip.filled { background: #d44f30; }
  .tree-col-bm  .pts-pip.filled { background: #6a9e3a; }
  .tree-col-ic  .pts-pip.filled { background: #9953ca; }

  .pts-label { font-size: 0.62rem; color: #555; margin-left: 2px; }
  .skill-node.maxed .pts-label { color: #888; }

  /* ─── Tooltip ─────────────────────────────────────────────── */
  .tooltip-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 200;
    pointer-events: none;
  }
  .tooltip-box {
    position: fixed;
    background: #1a1810;
    border: 1px solid #c97b12;
    border-radius: 6px;
    padding: 0.75rem 0.9rem;
    max-width: clamp(200px, 22vw, 320px);
    min-width: 180px;
    pointer-events: none;
    box-shadow: 0 8px 24px rgba(0,0,0,0.8);
  }
  .tooltip-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    color: #f0e0b0;
    margin-bottom: 4px;
  }
  .tooltip-meta   { font-size: 0.7rem;  color: #888;    margin-bottom: 5px; }
  .tooltip-meta .pts { color: #f0a020; font-weight: 600; }
  .tooltip-desc   { font-size: 0.75rem; color: #c0b898; line-height: 1.4; }
  .tooltip-effect { font-size: 0.72rem; color: #90c0a0; margin-top: 5px; font-style: italic; }

  /* ─── Info bar ────────────────────────────────────────────── */
  .info-bar {
    background: #0e0e0e;
    border-top: 1px solid #1a1a1a;
    padding: 0.4rem 1.25rem;
    display: flex;
    align-items: center;
    gap: 1.25rem;
    flex-wrap: wrap;
  }
  .info-item { font-size: 0.7rem; color: #555; }
  .info-item strong { color: #777; font-weight: 500; }
  .info-hint { font-size: 0.68rem; color: #3a3a3a; margin-left: auto; font-style: italic; }

  .tree-body { overflow-y: auto; flex: 1; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">Moze<span>pository</span></div>
  <div class="header-info">
    <div class="level-badge">Moze — The Gunner</div>
    <div class="sp-counter">
      <span class="label">SKILL POINTS</span><span id="sp-used">0</span> / <span id="sp-total">70</span>
    </div>
    <button class="reset-btn" onclick="resetAll()">↺ Reset</button>
  </div>
</div>

<div class="trees-container" id="trees"></div>

<div class="info-bar">
  <div class="info-item">Left-click to add · Right-click to remove</div>
  <div class="info-item">Each tier requires <strong>5 pts</strong> in the tree to unlock</div>
  <div class="info-hint">Base level 72 = 70 skill points available</div>
</div>

<div class="tooltip-overlay" id="tooltip-overlay">
  <div class="tooltip-box" id="tooltip-box">
    <div class="tooltip-name"   id="tt-name"></div>
    <div class="tooltip-meta"   id="tt-meta"></div>
    <div class="tooltip-desc"   id="tt-desc"></div>
    <div class="tooltip-effect" id="tt-effect"></div>
  </div>
</div>


<script>
const TREES = [
  {
    id: 'bm',
    name: 'Bottomless Mags',
    subtitle: 'Gun damage & ammo sustain',
    color: '#5bb8e8', 
    icon: 'images/spec/Minigun.webp',
    actionSkill: { 
      name: 'Minigun', 
      icon: 'images/wep/Minigun.webp',
      desc: `
        The <span style="color:#e87f45">Minigun</span> is capable of sustained rapid fire. 
        Firing for long periods causes the <span style="color:#e87f45">Minigun</span> to <span style="color: #f1d981">overheat</span>, rendering it inoperable for a few seconds.
        <br><br>
        <p><i>Put a little lead in the air and see what falls over.</i></p>
      `,
    },
    tiers: [
      { required: 0, skills: [
        { id: 'bm_cloud', name: 'Cloud of Lead', maxPts: 5, icon: 'images/spec/Cloud of Lead.webp', 
          desc: 
            `
              <td>Occasionally, Moze's and <span style="color:#e87f45">Iron Bear/Iron Cub's</span> shots will deal additional <b>Incendiary Damage</b> and won't consume ammo.
                <ul style="margin: 0; padding-left: 1em;">
                <li><span style="color: #f1d981">Bonus Incendiary Damage</span>: <span style = "color: #6a9e3a">+2.25%</span> per level</li>
              </ul>
            `
        },
        { id: 'bm_dakka', name: 'Dakka Bear', maxPts: 1, icon: 'images/spec/Dakka Bear.webp', 
          desc: 
            `
              Adds a <span style="color: #f1d981">manned turret</span> to the back of <span style="color:#e87f45">Iron Bear/Iron Cub</span>.
              While manned, <span style="color:#e87f45">Iron bear</span> and its rider gain <span style="color: #f1d981">Increased Damage</span>.
              If <span style="color:#e87f45">Iron Cub</span> is equipped, it gains <span style="color: #f1d981">Increased Damage</span> instead.
              <ul style="margin: 0; padding-left: 1em;">
                  <li><span style="color: #f1d981">Iron Bear/Iron Cub damage</span>: <span style = "color: #6a9e3a">+50%</span></li>
                  <li><span style="color: #f1d981">Iron Cub Damage</span>: <span style = "color: #6a9e3a">+20%</span></li>
              </ul>
              <br>
              <br>
              <p><i>Fasten your seatbelt. it's going to be a bumpy ride.</i>
            `
        },
        { id: 'bm_matched', name: 'Matched Set', maxPts: 5, icon: 'images/spec/Matched Set.webp', 
          desc: 
            `
              <td>Moze's currently equipped weapon gains a stacking bonus to <span style="color: #f1d981">Magazine Size</span> and <span style="color: #f1d981">Decreased Heat Per Shot</span> for every piece of equipped gear that has a <span style="color: #f1d981">matching manufacturer</span>.
              <ul style="margin: 0; padding-left: 1em;">
                <li><span style="color: #f1d981">Heat Per Shot</span>: <span style = "color: #6a9e3a">-2%</span> per level</li>
                <li><span style="color: #f1d981">Magazine Size</span>: <span style = "color: #6a9e3a">+2%</span> per level</li>
              </ul>
            `
        },
      ]},
      { required: 5, skills: [
        { id: 'bm_salamander', name: 'Salamander', maxPts: 1, icon: 'images/spec/Salamander.webp', type: 'weapon', 
          desc: 
            `
              <td>The <span style="color:#e87f45">Salamander</span> is a flamethrower that deals <span style="color: #f1d981">Incendiary Damage</span> at close range. 
              <br><br>
              Though the <span style="color:#e87f45">Salamander</span> has <span style="color: #f1d981">infinite ammo</span>, it <span style="color: #f1d981"> drains Fuel</span> while firing.
              <br><br>
              <p><i>Fire... for effect.</i></p>
            ` 
        },
        { id: 'bm_letoff', name: 'Let Off Some Steam', maxPts: 1, icon: 'images/spec/Let Off Some Steam.webp', type: 'augment', 
          desc: 
            `
              <td>The <span style="color:#e87f45">Minigun</span> deals <span style="color: #f1d981">More Damage</span> as heat increases, and can fire longer before <span style="color: #f1d981">overheating</span>.
              <ul style="margin: 0; padding-left: 1em;">
                <li><span style="color: #f1d981">Maximum Damage</span>: <span style="color: #6a9e3a">+80%</span></li>
              </ul>
            ` 
        },
        { id: 'bm_stoke', name: 'Stoke the Embers', maxPts: 3, icon: 'images/spec/Stoke the Embers.webp', 
          desc: 
            `
              <td>Increases Moze's and <span style="color:#e87f45">Iron Bear/Iron Cub's</span> <span style="color: #f1d981">Incendiary Damage</span>.
              <ul style="margin: 0; padding-left: 1em;">
                <li><span style="color: #f1d981">Incendiary Damage</span>: <span style = "color: #6a9e3a">+10%</span> per level</li>
              </ul>
            ` 
        },
        { id: 'bm_redist', name: 'Redistribution', maxPts: 1, icon: 'images/spec/Redistribution.webp', 
          desc: 
            `
              <td>After Mozes scores a <span style="color: #f1d981">Critical Hit</span>, she <span style="color: #f1d981">regenerates ammo and health</span> for a few seconds.
                The lower her health, the more power the health regeneration.
              <ul style="margin: 0; padding-left: 1em;">
                <li><span style="color: #f1d981">Ammo Regeneration</span>: <span style = "color: #6a9e3a">+5%</span> of magazine / sec</li>
                <li><span style="color: #f1d981">Health Regeneration</span>: Up to <span style = "color: #6a9e3a">+2.5%</span> Missing Health / sec</li>
                <li><span style="color: #f1d981">Redistribution Duration</span>: <span style = "color: #6a9e3a">3 seconds</span></li>
              </ul>
            ` 
        },
        { id: 'bm_scrappy', name: 'Scrappy', maxPts: 5, icon: 'images/spec/Scrappy.webp', 
          desc: 
            `
              <td>While <span style="color: #f1d981">moving</span>, Moze's <span style="color: #f1d981">Weapon Damage, Handling, Weapon Swap</span> and <span style="color: #f1d981">Mode Switch</span> are increased.
              <ul style="margin: 0; padding-left: 1em;">
                <li><span style="color: #f1d981">Weapon Damage</span>: <span style = "color: #6a9e3a">+6%</span> per level</li>
                <li><span style="color: #f1d981">Handling</span>: <span style = "color: #6a9e3a">+10.7% / +19.4% / +26.5% / +32.4% / +37.5%</span></li>
                <li><span style="color: #f1d981">Weapon Swap Speed</span>: <span style = "color: #6a9e3a">+16% / +27.5% / +36.3% / +43.2% / +48.7%</span></li>
                <li><span style="color: #f1d981">Mode Swap Speed</span>: <span style = "color: #6a9e3a">+16% / +27.5% / +36.3% / +43.2% / +48.7%</span></li>
              </ul>
            ` 
        }
      ]},
      { required: 10, skills: [
        { id: 'bm_genwinter', name: 'General Winter', maxPts: 1, icon: 'images/spec/General Winter.webp', type: 'augment', 
          desc: 
            `
              <td>The <span style="color:#e87f45">Minigun</span> fires <span style="color: #f1d981">Cryo Rounds</span> which reduce <span style="color: #f1d981">Heat Drain</span> and <span style="color: #f1d981">Fuel Drain</span>.
              <ul style="margin: 0; padding-left: 1em;">
                <li><span style="color: #f1d981">Minigun Damage</span>: <span style="color: #6a9e3a">-30%</span></li>
                <li><span style="color: #f1d981">Fuel Drain</span>: <span style="color: #6a9e3a">-40%</span></li>
                <li><span style="color: #f1d981">Converts to Cryo Damage</span></li>
              </ul>
            ` 
        },
        { id: 'bm_fueleco', name: 'Fuel Economy', maxPts: 1, icon: 'images/spec/Fuel Economy.webp', type: 'augment', 
          desc: 
            `

const state = {};
TREES.forEach(t => t.tiers.forEach(tier => tier.skills.forEach(s => { state[s.id] = 0; })));

function getSkillDesc(skill, pts) {
  const level = pts || 0;

  switch (skill.id) {
    case 'dw_fitsd': 
      return `
        <ul style="margin: 0; padding-left: 1em;">
          <li><strong>Bonus Incendiary Damage</strong>: <span style="color:#3a8fbf">+${3 * level}%</span></li>
        </ul>
      `;

    case 'dw_deadlines':
      return `
        <ul style="margin: 0; padding-left: 1em;">
          <li><Strong>Fuel Returned</Strong>: <span style="color: #3a8fbf">+${2 * level}%</span></li>
            <li><Strong>Fuel Drain</Strong>: <span style="color: #3a8fbf">-${10 * level}%</span></li>
        </ul>
      `;

    case 'dw_grizzled':
      return `
        <ul style="margin: 0; padding-left: 1em;">
          <li><strong>Iron Bear/Iron Cub Cooldown</strong>: <span style="color:#3a8fbf">-${1 * level}</span> sec</li>
        </ul>
      `;

    default:
      return skill.desc;
  }
}

function getTreePts(tree) {
  return tree.tiers.flatMap(t => t.skills)
    .filter(s => s.type !== 'augment' && s.type !== 'weapon')
    .reduce((sum, s) => sum + state[s.id], 0);
}
function getTotalUsed() { return Object.values(state).reduce((a, b) => a + b, 0); }
function getAvailable() { return 70 - getTotalUsed(); }

function isTierUnlocked(tree, tierIdx) {
  return tierIdx === 0 || getTreePts(tree) >= tree.tiers[tierIdx].required;
}

function canAddPoint(tree, skill) {
  if (skill.type === 'weapon' || skill.type === 'augment') return false;
  if (state[skill.id] >= skill.maxPts) return false;
  if (getAvailable() <= 0) return false;
  const tierIdx = tree.tiers.findIndex(t => t.skills.find(s => s.id === skill.id));
  return isTierUnlocked(tree, tierIdx);
}

function canRemovePoint(tree, skill) {
  if (state[skill.id] <= 0) return false;
  const tierIdx = tree.tiers.findIndex(t => t.skills.find(s => s.id === skill.id));
  const pts = getTreePts(tree);
  const wouldBe = (skill.type !== 'augment' && skill.type !== 'weapon') ? pts - 1 : pts;
  for (let i = tierIdx + 1; i < tree.tiers.length; i++) {
    const hasHigher = tree.tiers[i].skills.some(s => state[s.id] > 0);
    if (hasHigher && wouldBe <= tree.tiers[i].required) return false;
  }
  return true;
}

function handleSkillClick(e, treeId, skillId) {
  e.preventDefault();
  const tree = TREES.find(t => t.id === treeId);
  const skill = tree.tiers.flatMap(t => t.skills).find(s => s.id === skillId);
  if (e.type === 'contextmenu') {
    if (canRemovePoint(tree, skill)) { state[skillId]--; render(); }
  } else {
    if (canAddPoint(tree, skill)) { state[skillId]++; render(); }
  }
}

function resetAll() { Object.keys(state).forEach(k => state[k] = 0); render(); }

function showTooltip(e, skill) {
  document.getElementById('tooltip-overlay').style.display = 'block';
  document.getElementById('tt-name').textContent = skill.name;
  let meta = '';
  if (skill.type === 'augment') meta += 'Augment';
  else if (skill.type === 'weapon') meta += 'Iron Bear/Iron Cub Weapon';
  else if (skill.maxPts > 1) 
  {
    meta += `Max ${skill.maxPts} pts · `;
    meta += `${state[skill.id]}/${skill.maxPts} points`;
  }
  document.getElementById('tt-meta').innerHTML = `<span class="pts">${meta}</span>`;

  const pts = state[skill.id];
  document.getElementById('tt-desc').innerHTML = getSkillDesc(skill, pts);
  document.getElementById('tt-effect').textContent = skill.effect || '';

  const box = document.getElementById('tooltip-box');
  const rect = e.currentTarget.getBoundingClientRect();
  const bw = box.offsetWidth || 260;
  const bh = box.offsetHeight || 180;
  let left = rect.right + 10;
  let top  = rect.top;
  if (left + bw > window.innerWidth - 12) left = rect.left - bw - 10;
  if (top + bh > window.innerHeight - 12) top  = window.innerHeight - bh - 12;
  box.style.left = Math.max(8, left) + 'px';
  box.style.top  = Math.max(8, top)  + 'px';
}
function hideTooltip() { document.getElementById('tooltip-overlay').style.display = 'none'; }

function render() {
  const container = document.getElementById('trees');
  container.innerHTML = '';

  TREES.forEach(tree => {
    const treePts = getTreePts(tree);
    const col = document.createElement('div');
    col.className = `tree-column tree-col-${tree.id}`;

    let html = `
      <div class="tree-header">
        <div class="tree-name">${tree.name}${tree.dlc ? ' <span class="dlc-badge">DLC</span>' : ''}</div>
        <div class="tree-subtitle">${tree.subtitle}</div>

        <div class="tree-action-skill">
          <div class="as-header">
            <div class="as-header-icon">
              <img src="${tree.actionSkill.icon}" alt="${tree.actionSkill.name}" />
            </div>
            <div class="as-header-text">
              <div class="as-label">Action Skill</div>
              <div class="as-name">${tree.actionSkill.name}</div>
            </div>
          </div>
          <div class="as-body">${tree.actionSkill.desc}</div>
        </div>

        <div class="tree-pts">Tree points: <span>${treePts}</span></div>
      </div>
      <div class="tree-body">`;

    tree.tiers.forEach((tier, tierIdx) => {
      const unlocked = isTierUnlocked(tree, tierIdx);
      html += `<div class="tier${unlocked ? '' : ' tier-locked'}">
        <div class="tier-label">Tier ${tierIdx + 1}${tier.required > 0 ? ' · ' + tier.required + ' pts' : ''}</div>
        <div class="skills-grid">`;

      tier.skills.forEach(skill => {
        const pts = state[skill.id];
        const isMaxed  = pts >= skill.maxPts;
        const isLocked = !unlocked || skill.type === 'classmod';
        let nodeClass = 'skill-node';
        if (skill.type === 'augment')    nodeClass += ' augment';
        if (skill.type === 'weapon')     nodeClass += ' weapon-node';
        if (isMaxed)                     nodeClass += ' maxed';
        else if (pts > 0)                nodeClass += ' unlocked';
        else if (isLocked)               nodeClass += ' locked';

        let pipsHtml = '';
        if (skill.maxPts > 1) {
          pipsHtml = '<div class="skill-pts-row">';
          for (let i = 0; i < skill.maxPts; i++)
            pipsHtml += `<div class="pts-pip${i < pts ? ' filled' : ''}"></div>`;
          pipsHtml += `<span class="pts-label">${pts}/${skill.maxPts}</span></div>`;
        }

        let badgeHtml = '';
        if (skill.type === 'augment') badgeHtml = '<span class="skill-type-badge badge-augment">Augment</span>';
        if (skill.type === 'weapon')  badgeHtml = '<span class="skill-type-badge badge-weapon">IB Weapon</span>';

        html += `<div class="${nodeClass}" data-tree="${tree.id}" data-skill="${skill.id}">
          <div class="skill-icon"><img src="${skill.icon}" alt="${skill.name}" /></div>
          <div class="skill-info">
            ${badgeHtml}
            <div class="skill-name">${skill.name}</div>
            <div class="skill-desc">${skill.desc}</div>
            ${pipsHtml}
          </div>
        </div>`;
      });

      html += `</div></div>`;
    });

    html += `</div>`;
    col.innerHTML = html;
    container.appendChild(col);

    /* Events */
    col.querySelectorAll('.skill-node').forEach(el => {
      const treeId  = el.dataset.tree;
      const skillId = el.dataset.skill;
      const t = TREES.find(x => x.id === treeId);
      const s = t.tiers.flatMap(x => x.skills).find(x => x.id === skillId);
      if (!el.classList.contains('locked') && !el.classList.contains('weapon-node') && !el.classList.contains('augment')) {
        el.addEventListener('click',       e => handleSkillClick(e, treeId, skillId));
        el.addEventListener('contextmenu', e => { e.preventDefault(); handleSkillClick(e, treeId, skillId); });
      }
      el.addEventListener('mouseenter', e => showTooltip(e, s));
      el.addEventListener('mouseleave', hideTooltip);
    });
  });

  document.getElementById('sp-used').textContent = getTotalUsed();
}

function syncTreeHeaderHeights() {
  const headers = document.querySelectorAll('.tree-header');
  headers.forEach(h => h.style.height = 'auto');

  let maxHeight = 0;
  headers.forEach(h => {
    maxHeight = Math.max(maxHeight, h.offsetHeight);
  });

  headers.forEach(h => {
    h.style.height = `${maxHeight}px`;
  });
}

render();
